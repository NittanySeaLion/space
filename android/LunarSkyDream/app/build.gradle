plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.litigatech.lunarsky'
    compileSdk 34

    defaultConfig {
        applicationId "com.litigatech.lunarsky"
        minSdk 21         // Android 5.0 — DreamService minimum
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}
