<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Sky</title>
<link rel="stylesheet" href="/static/css/style.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-24QVLT0SZQ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-24QVLT0SZQ');
</script>
</head>
<body>

<div id="ov">
  <div class="spin"></div>
  <div>COMPUTING LUNAR EPHEMERIS</div>
  <div style="font-size:9px;opacity:.5">VSOP87 &middot; IAU MOON &middot; J2000.0</div>
</div>

<canvas id="c"></canvas>

<div id="loc-selector">
  <a href="?loc=shackleton" class="loc-btn" data-loc="shackleton">SHACKLETON</a>
  <a href="?loc=tranquility" class="loc-btn" data-loc="tranquility">TRANQUILITY</a>
  <a href="?loc=orientale" class="loc-btn" data-loc="orientale">ORIENTALE</a>
</div>

<button id="fsBtn" class="top-btn" onclick="toggleFS()">
  <svg viewBox="0 0 24 24"><path id="fsPath" d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>
  <span id="fsLabel">FULLSCREEN</span>
</button>
<button id="lblBtn" class="top-btn" onclick="toggleLabels()">LABELS ON</button>
<button id="evtBtn" class="top-btn off" onclick="toggleEvents()">EVENTS OFF</button>

<div id="events-panel" class="hidden">
  <div class="ep-title">EVENTS</div>
  <div id="ep-sunstate">&mdash;</div>
  <div id="ep-sunrise">&mdash;</div>
  <div id="ep-sunset">&mdash;</div>
  <div class="ep-sep"></div>
  <div id="ep-earthalt">&mdash;</div>
  <div id="ep-earthevent">&mdash;</div>
  <div id="ep-earthphase">&mdash;</div>
  <div id="ep-earthshine">&mdash;</div>
  <div class="ep-sep"></div>
  <div class="ep-dim" id="ep-note"></div>
</div>

<div id="mission-badge"></div>

<div id="hud">
  <div class="hc">
    <div class="bright" id="ht-houston">&mdash;</div>
    <div id="ht-utc">&mdash;</div>
    <div class="dim">VSOP87 EPHEMERIS &middot; NASA/JPL &middot; J2000.0</div>
  </div>
  <div class="hc r">
    <div class="bright">LUNAR SKY</div>
    <div id="h-lun">LUNAR LOCAL SIDEREAL &mdash;</div>
    <div class="dim" id="hsrc">LIVE &middot; HORIZONS ATTEMPTED</div>
  </div>
</div>
<div id="tooltip"></div>

<script src="/static/js/constants.js"></script>
<script src="/static/js/ephemeris.js"></script>
<script src="/static/js/stars.js"></script>
<script src="/static/js/milkyway.js"></script>
<script src="/static/js/events.js"></script>
<script src="/static/js/renderer.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
